spring:
  datasource:
    url: jdbc:h2:mem:strategy-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: true
  task:
    execution:
      pool:
        core-size: 2
        max-size: 4

loader:
  downloadMissingData: false
  downloadMissingBeforeData: false
  downloadMissingAfterData: false
